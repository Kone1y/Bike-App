server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bike_app?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.bike.module.*.entity,com.bike.module.auth.entity,com.bike.module.system.entity,com.bike.module.bike.entity,com.bike.module.scenic.entity,com.bike.module.area.entity,com.bike.module.repair.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: bike-app-jwt-secret-key-2024-very-long-and-secure-key
  expiration: 86400000

# 文件上传
file:
  upload-path: ./uploads/

# 微信小程序配置
wechat:
  appid: your-appid-here
  secret: your-secret-here
  dev-mode: true

# 计费配置
billing:
  base-fee: 2.00
  free-duration: 10
  rate-per-minute: 0.50
  daily-cap: 30.00
